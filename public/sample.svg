<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- S-curve centerline: demonstrates wave following a flowing curve -->
  <path
    id="s-curve"
    d="M 15,100 C 30,30 80,30 100,100 C 120,170 170,170 185,100"
    fill="none"
    stroke="#888"
    stroke-width="1.5"
  />

  <!-- Ellipse: demonstrates wave wrapping a closed curved centerline -->
  <ellipse
    id="oval"
    cx="100"
    cy="100"
    rx="72"
    ry="38"
    fill="none"
    stroke="#888"
    stroke-width="1.5"
  />

  <!-- Diagonal line: demonstrates wave on a straight centerline -->
  <line
    id="diagonal"
    x1="20"
    y1="20"
    x2="180"
    y2="60"
    stroke="#888"
    stroke-width="1.5"
  />
</svg>
